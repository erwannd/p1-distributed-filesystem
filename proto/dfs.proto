syntax = "proto3";
option go_package = "github.com/erwannd/p1-distributed-filesystem/messages;messages";

/**
 * Storage -> Controller
 * Sent when a Storage node just started
 */
message RegisterRequest {
    string hostname = 1;    // hostname or IP
    int32 port = 2;         // listening port
    uint64 free_space = 3;  // available disk space (bytes)
}

// Controller -> Storage
message RegisterResponse {
    bool ok = 1;
    uint32 node_id = 2;     // unique ID for this node
    string error = 3;       // empty if ok=True otherwise error message
}

// Storage -> Controller
// Send every 5 seconds
// Piggyback replication response if Controller made a replication request
message Heartbeat {
    uint32 node_id = 1;
    uint64 free_space = 2;      // free disk space (bytes)
    uint64 num_request = 3;     // number of request handled
    repeated ChunkInfo new_chunks = 4; // ack that a replication request is successful
}

// Controller -> Storage
// Piggback replication request, if a node failed
message HeartbeatResponse {
    bool ack = 1;
    repeated ReplicateRequest replicate_request = 2;  // maybe carry replication request here?
}

// Controller -> Storage
message ReplicateRequest {
    string src_host = 1;        // host to replicate chunk from
    int32 src_port = 2;         // port the host is listening on
    ChunkInfo chunk_info = 3;
}

// --- CLIENT ---

// Represents a chunk of a file
message ChunkInfo {
    string filename = 1;    
    uint32 chunk_index = 2; // chunk number
}

// Represents a storage node's address
message NodeInfo {
    uint32 node_id = 1;
    string hostname = 2;
    int32 port = 3;
}

// Represents where to send a specific chunk
message ChunkMapping {
    ChunkInfo chunk_info = 1;       // which chunk
    repeated NodeInfo nodes = 2;    // locations of primary & replicas (e.g. [A, B, C])
}

// Client -> Controller
message StoreRequest {
    string filename = 1;
    uint32 chunk_count = 2;
    uint64 chunk_size = 3;  // to be consistent with freespace in Heartbeat, also uint64
    uint64 file_size = 4;   // total file size
}

// Controller -> Client
message StoreResponse {
    bool ok = 1;
    string error = 2;   // empty if ok=true
    repeated ChunkMapping destinations = 3;
}

// Client -> Controller
message RetrieveRequest {
    string filename = 1;
}

// Controller -> Client
message RetrieveResponse {
    bool ok = 1;
    string error = 2; // empty if ok=true
    repeated ChunkMapping locations = 3;
}

// Client -> Controller
// Returns metadata for a single completed file.
message StatFileRequest {
    string filename = 1;
}

// Controller -> Client
message StatFileResponse {
    bool ok = 1;
    string error = 2; // empty if ok=true
    string filename = 3;
    uint64 file_size = 4;
    uint64 chunk_size = 5;
    uint32 chunk_count = 6;
}

enum SplitMode {
    SPLIT_MODE_UNSPECIFIED = 0;
    TEXT_LINES = 1;
    BINARY_CHUNKS = 2;
}

message InputSplit {
    uint32 split_index = 1;
    string filename = 2;
    uint64 start_offset = 3;
    uint64 end_offset_exclusive = 4;
    uint64 start_line_number = 5;      // zero-based; 0 for binary splits
    repeated NodeInfo preferred_nodes = 6;
}

// Client -> Controller
// Ask the DFS to expose logical read splits for MapReduce.
message GetInputSplitsRequest {
    string filename = 1;
    SplitMode split_mode = 2;
    uint64 desired_split_size_bytes = 3;   // 0 means "use DFS chunk size"
}

// Controller -> Client
message GetInputSplitsResponse {
    bool ok = 1;
    string error = 2;
    repeated InputSplit splits = 3;
}

// Client -> Controller
message DeleteRequest {
    string filename = 1;
}

// Controller -> Client
message DeleteResponse {
    bool ok = 1;        // success or fail
    string error = 2;   // empty if ok=true
}

// Client -> Controller
// List all stored files
message ListRequest {}

// Represents a file in the system
message FileInfo {
    string filename = 1;
    uint64 file_size = 2;
    uint32 chunk_count = 3; // how many chunks does this file have
}

// Controller -> Client
message ListResponse {
    bool ok = 1;
    string error = 2;
    repeated FileInfo files = 3;    // empty if no files stored
}

// Client -> Controller
// Request for node list + disk space + request counts
message ClusterInfoRequest {}

// Represents a storage node's runtime stats
message NodeStats {
    NodeInfo node_info = 1;     // id, hostname, port
    uint64 free_space = 2;      // free space
    uint64 num_requests = 3;    // request count
}

// Controller -> Client
message ClusterInfoResponse {
    repeated NodeStats node_stats = 1;
    uint64 total_free_space = 2;    // total across all nodes
    uint64 total_requests = 3;      // total request count
}

// Client -> Storage AND Storage -> Storage
message StoreChunkRequest {
    ChunkInfo chunk_info = 1;       // filename + chunk index
    bytes chunk_data = 2;
    bytes checksum = 3;
    repeated NodeInfo pipeline = 4; // next remaining nodes in the pipeline
}

// Storage -> Client
message StoreChunkResponse {
    bool ok = 1;        // success or fail
    string error = 2;   // empty if ok=true
    ChunkInfo chunk_info = 3;   // which chunk was successfully saved (useful for error reporting)
}

/** 
 * Client -> Storage
 * Retrieve a chunk from this node
 * Include `replica_hints` in case the chunk is corrupted
 */
message RetrieveChunkRequest {
    ChunkInfo chunk_info = 1;
    repeated NodeInfo replica_hints = 2;  // for fallback if the chunk is corrupted
}

/** 
 * Storage -> Client
 */
message RetrieveChunkResponse {
    bool ok = 1;
    string error = 2;       // empty if ok=true
    bytes chunk_data = 3;
}

// Client/Controller -> Storage
// Read a verified byte range from one chunk without changing the on-disk
// storage format. Logical file-range reads can be composed from this primitive.
message ReadChunkRangeRequest {
    ChunkInfo chunk_info = 1;
    uint64 chunk_offset = 2;
    uint64 length = 3;
}

// Storage -> Client/Controller
message ReadChunkRangeResponse {
    bool ok = 1;
    string error = 2;
    ChunkInfo chunk_info = 3;
    bytes chunk_data = 4;
}

// Controller -> Storage
// Controller issues deletion instead of client
message DeleteChunkRequest {
    ChunkInfo chunk_info = 1;
}

message DeleteChunkResponse {
    bool ok = 1;
    string error = 2;
    ChunkInfo chunk_info = 3;   // so Controller knows which chunk this ack is for
}

/**
 * Storage -> Storage
 * Request a chunk, if local copy is corrupted
 */
message RepairChunkRequest {
    ChunkInfo chunk_info = 1;
}

/**
 * Storage -> Storage
 * Send a validated chunk to the requester node.
 * If local copy is also corrupted, send ok=false and don't send the chunk
 */
message RepairChunkResponse {
    bool ok = 1;
    string error = 2;           // empty if ok=true
    ChunkInfo chunk_info = 3;
    bytes chunk_data = 4;
}

/**
 * Storage -> Controller
 * Asks for a list of nodes that holds the replica of a chunk
 */
message ChunkLocationsRequest {
    ChunkInfo chunk_info = 1;   // which chunk
}

/**
 * Controller -> Storage
 * Responds with a list of nodes holding the chunk
 */
message ChunkLocationsResponse {
    bool ok = 1;
    string error = 2;
    ChunkInfo chunk_info = 3;       // which chunk
    repeated NodeInfo nodes = 4;    // which node holds this chunk
}

// --- EXTRAS ---

message Wrapper {
    oneof msg {
        // Controller <-> Storage
        RegisterRequest register_request = 1;
        RegisterResponse register_response = 2;
        Heartbeat heartbeat = 3;
        HeartbeatResponse heartbeat_response = 4;
        ReplicateRequest replicate_request = 5;

        // Client <-> Controller
        StoreRequest store_request = 6;
        StoreResponse store_response = 7;
        RetrieveRequest retrieve_request = 8;
        RetrieveResponse retrieve_response = 9;
        StatFileRequest stat_file_request = 10;
        StatFileResponse stat_file_response = 11;
        GetInputSplitsRequest get_input_splits_request = 12;
        GetInputSplitsResponse get_input_splits_response = 13;
        DeleteRequest delete_request = 14;
        DeleteResponse delete_response = 15;
        ListRequest list_request = 16;
        ListResponse list_response = 17;
        ClusterInfoRequest cluster_info_request = 18;
        ClusterInfoResponse cluster_info_response = 19;

        // Client <-> Storage
        StoreChunkRequest store_chunk_request = 20;
        StoreChunkResponse store_chunk_response = 21;
        RetrieveChunkRequest retrieve_chunk_request = 22;
        RetrieveChunkResponse retrieve_chunk_response = 23;
        ReadChunkRangeRequest read_chunk_range_request = 24;
        ReadChunkRangeResponse read_chunk_range_response = 25;

        // Controller <-> Storage
        DeleteChunkRequest delete_chunk_request = 26;
        DeleteChunkResponse delete_chunk_response = 27;

        // Checksum validation
        RepairChunkRequest repair_chunk_request = 28;
        RepairChunkResponse repair_chunk_response = 29;
        ChunkLocationsRequest chunk_locations_request = 30;
        ChunkLocationsResponse chunk_locations_response = 31;
    }
}
